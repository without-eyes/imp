{
  "core": {
    "log_level": 5,
    "log_file": "/var/log/imp/imp.log",
    "pid_file": "/var/run/imp.pid"
  },
  "modules": [
    {
      "name": "security",
      "enabled": true,
      "so_path": "/usr/lib/imp/modules/imp_security.so",
      "config": {
        "check_interval_sec": 1800,
        "critical_files": [
          "/etc/shadow",
          "/etc/passwd",
          "/etc/sudoers"
        ]
      }
    },
    {
      "name": "prioritizer",
      "enabled": true,
      "so_path": "/usr/lib/imp/modules/imp_prioritizer.so",
      "config": {
        "check_interval_sec": 5,
        "cpu_threshold_percent": 80,
        "ram_threshold_mb": 1024,
        "important_processes": ["imp", "sshd", "systemd", "Xorg"],
        "action": "renice" 
      }
    },
    {
      "name": "memory",
      "enabled": true,
      "so_path": "/usr/lib/imp/modules/imp_memory.so",
      "config": {
        "check_interval_sec": 3600,
        "critical_disk_usage_percent": 90,
        "targets": [
          {
            "path": "/tmp",
            "mask": "*",
            "max_age_days": 1
          },
          {
            "path": "/var/log/imp",
            "mask": "*.log*",
            "max_age_days": 7
          }
        ]
      }
    }
  ]
}