{
  "core": {
    "log_level": 5,
    "log_file": "/var/log/imp/imp.log",
    "pid_file": "/var/run/imp.pid"
  },
  "modules": [
    {
      "name": "interface",
      "enabled": false,
      "so_path": "build/modules/imp_interface.so",
      "config": {
        "desktop_notifications": false
      }
    },
    {
      "name": "security",
      "enabled": false,
      "so_path": "build/modules/imp_security.so",
      "config": {
        "scan_ssh_connections": true,
        "scan_open_ports": true
      }
    },
    {
      "name": "prioritizer",
      "enabled": false,
      "so_path": "build/modules/imp_prioritizer.so",
      "config": {
        "max_cpu_usage_per_process": 50,
        "max_ram_usage_per_process": 50
      }
    },
    {
      "name": "memory",
      "enabled": true,
      "so_path": "build/modules/imp_memory.so",
      "config": {
        "check_interval_sec": 3600,
        "critical_disk_usage_percent": 90,
        "targets": [
          {
            "path": "/tmp",
            "mask": "*",
            "max_age_days": 1
          },
          {
            "path": "/var/log/imp",
            "mask": "*.log*",
            "max_age_days": 7
          }
        ]
      }
    }
  ]
}